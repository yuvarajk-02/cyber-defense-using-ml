<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Security System</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #0e1117, #161b22);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* Center Box */
.container {
    text-align: center;
    padding: 40px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
}

/* Title */
h1 {
    font-size: 32px;
    margin-bottom: 10px;
    color: #58a6ff;
}

/* Subtitle */
p {
    font-size: 16px;
    opacity: 0.8;
}

/* Status badge */
.status {
    margin-top: 20px;
    padding: 10px 20px;
    border-radius: 25px;
    display: inline-block;
    background: #00ff88;
    color: black;
    font-weight: bold;
    animation: pulse 1.5s infinite;
}

/* Animation */
@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(0,255,136,0.6); }
    70% { box-shadow: 0 0 0 15px rgba(0,255,136,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,255,136,0); }
}

/* Button */
.btn {
    margin-top: 25px;
    display: inline-block;
    padding: 10px 20px;
    background: #58a6ff;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.3s;
}

.btn:hover {
    background: #1f6feb;
}
</style>

</head>

<body>

<div class="container">
    <h1>🛡️ Cyber Security System</h1>
    <p>AI-Based Real-Time Threat Detection Dashboard</p>

    <div class="status">🚀 Currently Working</div>

    <br>

    <!-- Button to open dashboard later -->
    <a href="#" class="btn">Enter Dashboard</a>
</div>

</body>
</html>
